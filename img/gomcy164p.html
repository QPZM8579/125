        body {

            padding: 0;
            overflow: hidden;
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .slideshow {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .slide {
            display: none;
            width: 100%;
            height: 100%;
            object-fit: contain; /* 保持原比例显示 */
            position: absolute;
            top: 0;
            left: 0;
        }
        .slide.active {
            display: block;
        }
        /* 页码样式 */
        .counter {
            position: absolute;
            top: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.8);
            background: rgba(0, 0, 0, 0.4);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 10;
            pointer-events: none; /* 防止点击页码触发切图 */
        }
        .arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 30px;
            color: rgba(255, 255, 255, 0.3);
            background: none;
            cursor: pointer;
            user-select: none;
            z-index: 5;
        }
        .left-arrow { left: 25px; }
        .right-arrow { right: 25px; }
    </style>
</head>

        <!-- 左右箭头 -->
        <div class="arrow left-arrow">〈</div>
        <div class="arrow right-arrow">〉</div>
    </div>

    <script>
        const slides = document.querySelectorAll('.slide');
        const slideshow = document.querySelector('.slideshow');
        const counter = document.getElementById('pageCounter');
        let currentSlide = 0;

        // 更新显示（图片和页码）
        function updateDisplay(index) {
            slides.forEach((slide, i) => {
                slide.classList.toggle('active', i === index);
            });
            // 更新页码文字：当前序号 / 总数
            counter.textContent = `${index + 1} / ${slides.length}`;
        }

        // 下一张
        function nextSlide() {
            currentSlide = (currentSlide + 1) % slides.length;
            updateDisplay(currentSlide);
        }

        // 上一张
        function prevSlide() {
            currentSlide = (currentSlide - 1 + slides.length) % slides.length;
            updateDisplay(currentSlide);
        }

        // 自动轮播计时器
        let autoSlide = setInterval(nextSlide, 3000);

        // 重置计时器函数
        function resetTimer() {
            clearInterval(autoSlide);
            autoSlide = setInterval(nextSlide, 3000);
        }

        // 全屏点击切换逻辑
        slideshow.addEventListener('click', (e) => {
            const rect = slideshow.getBoundingClientRect();
            const clickX = e.clientX - rect.left;

            resetTimer();

            if (clickX < rect.width / 2) {
                prevSlide(); // 点击左半边
            } else {
                nextSlide(); // 点击右半边
            }
        });

        // 键盘支持
        document.addEventListener('keydown', (e) => {
            if (e.key === "ArrowLeft") { resetTimer(); prevSlide(); }
            if (e.key === "ArrowRight") { resetTimer(); nextSlide(); }
        });

        // 初始运行一次
        updateDisplay(currentSlide);
    </script>
