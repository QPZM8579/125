<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极速图片展示墙 (竖版3:4)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f0f2f5; font-family: "Microsoft YaHei", sans-serif; display: flex; justify-content: center; padding: 20px; }
        
        .grid-container {
            display: grid;
            /* 竖向长方形建议最小宽度 160px-180px，排列更紧凑好看 */
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
            max-width: 1100px;
            width: 100%;
        }
        
        .grid-item {
            background: white; border-radius: 10px; overflow: hidden;
            text-decoration: none; box-shadow: 0 2px 8px rgba(0,0,0,0.06); transition: 0.3s;
        }
        
        .grid-item:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        .image-box { 
            width: 100%; 
            /* 核心修改：设置为 3:4 竖版比例 */
            aspect-ratio: 3 / 4; 
            background: #e1e1e1; 
            overflow: hidden; 
        }
        
        .image-box img { 
            width: 100%; height: 100%; 
            object-fit: cover; /* 保证图片竖向填充，不拉伸 */
            display: block; 
        }
        
        .title { 
            padding: 8px; text-align: center; font-size: 13px; color: #333; 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
        }
        
        @media (max-width: 480px) { 
            .grid-container { grid-template-columns: repeat(2, 1fr); gap: 10px; } 
        }
    </style>
</head>
<body>

<div class="grid-container" id="mainGrid"></div>

<script>
    // 在这里快速添加图片数据
    const imageList = [
        { title: "上床睡觉", img: "xxximg.dpdns.org/img/2026/03/xxxmarie.{ext}", url: "https://520.236588.xyz/marie118p.html" },
        { title: "竖版示例 02", img: "https://yzcdn.cn", url: "#" },
        { title: "竖版示例 03", img: "https://yzcdn.cn", url: "#" },
        { title: "竖版示例 04", img: "https://yzcdn.cn", url: "#" },
        { title: "竖版示例 05", img: "https://yzcdn.cn", url: "#" }
    ];

    const grid = document.getElementById('mainGrid');
    grid.innerHTML = imageList.map(item => `
        <a href="${item.url}" class="grid-item">
            <div class="image-box">
                <img src="${item.img}" loading="lazy">
            </div>
            <div class="title">${item.title}</div>
        </a>
    `).join('');
</script>

</body>
</html>
